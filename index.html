<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智标云鉴 - AI内容标识责任界定助手</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Microsoft YaHei', Arial, sans-serif;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo svg {
      width: 60px;
      height: 60px;
    }
    h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 15px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    p {
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 16px 48px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="#667eea">
        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
      </svg>
    </div>
    <h1>智标云鉴</h1>
    <p>一站式AI内容标识责任界定助手及合规检测平台</p>
    <a href="index/Index.html" class="btn">进入网站</a>
  </div>
</body>
</html>
