* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

ol,ul,menu {
  padding-inline-start: 0;
  list-style: none;
}

ol li::marker, ul li::before {
  letter-spacing: 0;
}

/* 返回首页按钮 */
.back-home {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  z-index: 1000;
  transition: all 0.3s ease;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.back-home:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
}

.back-home:active {
  transform: scale(0.95);
}

.back-home svg {
  width: 18px;
  height: 18px;
}

.scroll-container > div {
  width: 100%;
}

.container > div {
  width: 100%;
}

.Pixso-canvas-0_1 > div {

}
