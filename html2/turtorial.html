<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作教程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            overflow: hidden;
        }

        .image-container {
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* 返回按钮 */
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .back-home:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        .back-home:active {
            transform: scale(0.95);
        }

        .back-home svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <a href="../index/Index.html" class="back-home">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M11 2L5 8l6 6" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        返回首页
    </a>

    <div class="image-container">
        <img src="../assets/c__Users_Administrator_Desktop________turtorial.png" alt="操作教程">
    </div>
</body>
</html>
