      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .screen-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }
    .game-canvas {
      width: 1920px;
      height: 1080px;
      position: relative;
      transform-origin: center center;
      transform: scale(min(100vw / 1920, 100vh / 1080));
    }
    .page {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
    }
    .page.active {
      opacity: 1;
      visibility: visible;
    }
    .bg-layer {
      width: 1920px;
      height: 1080px;
      position: absolute;
      left: 0;
      top: 0;
      background-size: cover;
      background-position: center;
    }

      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-effect:hover {

    }
    .btn-effect:active {
      transform: scale(0.94);
      opacity: 0.85;
    }

    /* 导航按钮 */
    .nav-btn {
      position: fixed;
      bottom: 20px;
      width: 110px;
      height: 42px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 21px;
      font-size: 15px;
      cursor: pointer;
      z-index: 100;
      transition: all 0.2s ease;
    }
    .nav-btn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
    }
    .nav-btn:active:not(:disabled) {
      transform: scale(0.92);
    }
    .nav-btn.prev { left: 20px; }
    .nav-btn.next { right: 20px; }
    .nav-btn:disabled { background: #444; cursor: not-allowed; }

    .page-indicator {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 100;
    }
    .indicator-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .indicator-dot:hover {
      background: rgba(255,255,255,0.7);
      transform: scale(1.3);
    }
    .indicator-dot.active {
      background: #fff;
      transform: scale(1.2);
    }

    /* 返回首页按钮 */

      position: fixed;
      top: 20px;
      left: 20px;

      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.2s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .back-home:hover {

      <div class="bg-layer rectangle-2_16"></div>

    </div>

<button class="nav-btn prev" onclick="prevPage()">上一页</button>
<button class="nav-btn next" onclick="nextPage()">下一页</button>
<div class="page-indicator">
  <div class="indicator-dot active" onclick="goToPage(1)"></div>
  <div class="indicator-dot" onclick="goToPage(2)"></div>
</div>

<script>
  let currentPage = 1;
  const totalPages = 2;

  function updatePage() {
    document.querySelectorAll('.page').forEach((p, i) => {
      p.classList.toggle('active', i + 1 === currentPage);
    });
    document.querySelectorAll('.indicator-dot').forEach((d, i) => {
      d.classList.toggle('active', i + 1 === currentPage);
    });
    document.querySelector('.prev').disabled = currentPage === 1;
    document.querySelector('.next').disabled = currentPage === totalPages;
  }

  function goToPage(n) {
    if (n >= 1 && n <= totalPages) {
      currentPage = n;
      updatePage();
    }
  }
  function nextPage() { goToPage(currentPage + 1); }
  function prevPage() { goToPage(currentPage - 1); }

  // ========== 所有按钮点击跳转 ==========
  const click = (url) => window.open(url, '_blank');

  document.querySelector('.rectangle-2_18').onclick = ()=>click('https://gptzero.me/');
  document.querySelector('.rectangle-2_19').onclick = ()=>click('https://aidetector.com/?new_locale=zh-cn');
  document.querySelector('.rectangle-2_20').onclick = ()=>click('https://mydetector.ai/zh/');
  document.querySelector('.rectangle-2_21').onclick = ()=>click('https://matrix.tencent.com/ai-detect/ai_gen');
  document.querySelector('.rectangle-2_22').onclick = ()=>click('https://mydetector.ai/zh/ai-image-detector/');
  document.querySelector('.rectangle-2_23').onclick = ()=>click('https://www.aidetectlab.com/zh');

  document.querySelector('.rectangle-2_29').onclick = ()=>click('https://matrix.tencent.com/ai-detect/ai_gen');
  document.querySelector('.rectangle-2_30').onclick = ()=>click('https://undetectable.ai/zh/ai-video-detector');
  document.querySelector('.rectangle-2_32').onclick = ()=>click('https://www.pindrop.com/product/pindrop-pulse/inspect/');
  document.querySelector('.rectangle-2_33').onclick = ()=>click('https://hivemoderation.com/ai-generated-content-detection');
  document.querySelector('.rectangle-2_35').onclick = ()=>click('https://mydetector.ai/zh/');
  document.querySelector('.rectangle-2_36').onclick = ()=>click('https://aivoicedetector.com/');
  document.querySelector('.rectangle-2_37').onclick = ()=>click('https://undetectable.ai/zh/ai-video-detector');

  updatePage();
</script>
