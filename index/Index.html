<script>
const $ = id => document.getElementById(id);

// 按钮点击反馈样式
const buttonStyle = document.createElement('style');
buttonStyle.textContent = `
  .clickable-btn {
    transition: transform 0.15s ease-out, filter 0.15s ease-out, opacity 0.15s ease-out;
    user-select: none;
  }
  .clickable-btn:hover {
    transform: scale(1.03);
    filter: brightness(1.1);
  }
  .clickable-btn:active {
    transform: scale(0.97);
    filter: brightness(0.95);
  }
  .clickable-btn.clicking {
    animation: clickPulse 0.3s ease-out;
  }
  @keyframes clickPulse {
    0% { transform: scale(0.95); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
`;
document.head.appendChild(buttonStyle);

// 页面跳转配置
const pageLinks = {
  '2_5': '../feedback/feedback.html',                          // 右侧上方 - 反馈页面
  '2_6': '../Calculater/ai_labeling_calculator.html',         // 左侧下方 - AI标识计算器
  '2_7': '../toolbox/toolbox.html',                           // 左侧上方 - 工具箱
  '2_8': '../ai-tool/index.html'                              // 右侧下方 - AI检测工具
};

// 为按钮添加点击事件
Object.entries(pageLinks).forEach(([id, url]) => {
  const element = $(id);
  if (element) {
    element.classList.add('clickable-btn');
    element.addEventListener("click", function(e) {
      e.stopPropagation();
      element.classList.add('clicking');
      setTimeout(() => {
        window.location.href = url;
      }, 150);
    });
  }
});
</script>
